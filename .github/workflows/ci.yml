name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      CMAKE_DISABLE_FIND_PACKAGE_Vulkan: "TRUE"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libespeak-ng-dev pkg-config cmake

      - name: Cargo check
        run: cargo check

      - name: Cargo clippy
        run: cargo clippy -- -D warnings
