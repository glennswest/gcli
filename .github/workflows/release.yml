name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: gcli-macos-x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: gcli-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: gcli-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libespeak-ng-dev pkg-config cmake

      - name: Build release binary
        run: cargo build --release

      - name: Rename binary (Unix)
        if: matrix.os != 'windows-latest'
        run: mv target/release/gcli ${{ matrix.binary }}

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        run: mv target/release/gcli.exe ${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/gcli-macos-x86_64/gcli-macos-x86_64
            artifacts/gcli-linux-x86_64/gcli-linux-x86_64
            artifacts/gcli-windows-x86_64.exe/gcli-windows-x86_64.exe
