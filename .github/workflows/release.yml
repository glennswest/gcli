name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            binary: gcli-macos-arm64
          - os: ubuntu-latest
            binary: gcli-linux-x86_64
          - os: ubuntu-24.04-arm
            binary: gcli-linux-arm64
          - os: windows-latest
            binary: gcli-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libespeak-ng-dev pkg-config cmake \
            libvulkan-dev glslc

      - name: Install Vulkan SDK (Windows)
        if: runner.os == 'Windows'
        uses: humbletim/setup-vulkan-sdk@v1.2.0
        with:
          vulkan-query-version: 1.3.290.0
          vulkan-components: Vulkan-Headers, Vulkan-Loader, Glslang, SPIRV-Tools
          vulkan-use-cache: true

      - name: Build release binary
        run: cargo build --release

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: mv target/release/gcli ${{ matrix.binary }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: mv target/release/gcli.exe ${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/gcli-macos-arm64/gcli-macos-arm64
            artifacts/gcli-linux-x86_64/gcli-linux-x86_64
            artifacts/gcli-linux-arm64/gcli-linux-arm64
            artifacts/gcli-windows-x86_64.exe/gcli-windows-x86_64.exe
