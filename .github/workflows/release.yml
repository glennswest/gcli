name: Release (Windows)

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Vulkan SDK
        shell: pwsh
        run: |
          $ver = "1.3.290.0"
          $url = "https://sdk.lunarg.com/sdk/download/${ver}/windows/VulkanSDK-${ver}-Installer.exe"
          Invoke-WebRequest -Uri $url -OutFile VulkanSDK-Installer.exe
          Start-Process -FilePath .\VulkanSDK-Installer.exe -ArgumentList "--accept-licenses --default-answer --confirm-command install" -Wait
          $sdkPath = "C:\VulkanSDK\${ver}"
          echo "VULKAN_SDK=${sdkPath}" >> $env:GITHUB_ENV
          echo "${sdkPath}\Bin" >> $env:GITHUB_PATH

      - name: Build release binary
        run: cargo build --release

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/gcli.exe
